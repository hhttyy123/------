events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 1. 强制 HTTP 跳转 HTTPS
    server {
        listen 80;
        server_name catal.online www.catal.online;
        return 301 https://$host$request_uri;
    }

    # 2. HTTPS 主配置
    server {
        listen 443 ssl http2;
        server_name catal.online www.catal.online;

        # --- SSL 证书配置 ---
        ssl_certificate     /etc/nginx/ssl/catal.online_bundle.pem;
        ssl_certificate_key /etc/nginx/ssl/catal.online.key;

        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # 常用 Proxy Header 优化
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- 业务路由 ---

        # 1. 博客应用 & API
        location / {
            proxy_pass http://blog:3000;
        }
        location /api/ {
            proxy_pass http://blog:3000;
        }

        # 2. 化学工具前端 (静态文件)
        location /chem/ {
            alias /usr/share/nginx/html/chem/;
            index index.html;
            try_files $uri $uri/ /chem/index.html;
        }

        # 3. 化学 AI 后端
        location /api-chem/ {
            rewrite ^/api-chem/(.*)$ /$1 break;
            proxy_pass http://ai-chem-backend:8000;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # 4. 3D 可视化转发
        location /3d/ {
            proxy_pass http://3d-vis-backend:8001/;
        }

        # 5. 微信通知
        location /notify {
            proxy_pass http://wechat-service:5000/notify;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # === 以下新增：劳务管理系统 ===

        # 6. 劳务系统前端 (静态文件)
        location /manx/ {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /manx/index.html;
        }

        # 7. 劳务系统后端 API
        location /api/manx/ {
            rewrite ^/api/manx/(.*)$ /$1 break;
            proxy_pass http://manx-backend:8000;
            proxy_read_timeout 120s;
        }

        # 错误页面
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
